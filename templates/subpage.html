<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - GSC Salzgitter e.V.</title>
    <link rel="stylesheet" href="../css/styles.css">
    <meta name="description" content="{{DESCRIPTION}}">
</head>

<body>
    <!-- Navigation -->
    <header class="navbar scrolled">
        <div class="container" style="max-width: 800px; height: 100%; display: flex; align-items: center;">
            <div class="back-nav">
                <a href="../index.html">&larr; Startseite</a>
            </div>
        </div>
    </header>

    <!-- Blog Header Section -->
    <section class="section dark-bg" style="padding-top: 140px; padding-bottom: 2rem;">
        <div class="container" style="max-width: 800px; margin: 0 auto;">
            <span class="time"
                style="display: inline-block; background: var(--color-primary); color: #fff; padding: 0.3rem 0.8rem; border-radius: 20px; font-weight: 600; font-size: 0.9rem; margin-bottom: 1rem;">{{DATE}}</span>
            <h1 style="font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 1rem; line-height: 1.1;">{{TITLE}}</h1>
            <p style="font-size: 1.2rem; color: var(--color-text-muted);">{{DESCRIPTION}}</p>
        </div>
    </section>

    <!-- Blog Content Section -->
    <section class="section dark-bg">
        <div class="container">
            <div class="blog-content"
                style="max-width: 800px; margin: 0 auto; color: var(--color-text); line-height: 1.8; font-size: 1.1rem;">

                {{CONTENT}}

                <div
                    style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: flex-start; align-items: center;">
                    <a href="../index.html#neuigkeiten" class="btn btn-outline">
                        ← Zurück zu den Neuigkeiten
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="text-align: center; border-top: none; margin-top: 0;">
                <p>&copy; 2026 GSC Salzgitter e.V. im ADAC - Alle Rechte vorbehalten.</p>
            </div>
        </div>
    </footer>

    <script src="../js/script.js"></script>
</body>

</html>
