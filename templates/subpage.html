<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{{TITLE}} - GSC Salzgitter e.V.</title>
    <link rel="stylesheet" href="../css/styles.css?v=1.2.0">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <meta name="description" content="{{DESCRIPTION}}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{TITLE}} - GSC Salzgitter e.V.">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:image" content="https://www.gsc-salzgitter.de/assets/favicon.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="{{TITLE}} - GSC Salzgitter e.V.">
    <meta property="twitter:description" content="{{DESCRIPTION}}">
    <meta property="twitter:image" content="https://www.gsc-salzgitter.de/assets/favicon.png">
</head>

<body class="black-bg">
    <!-- Thin Glassmorphic Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <div class="back-nav">
                <a href="../index.html">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline-block; vertical-align:middle; margin-right:4px;">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>Zur Startseite
                </a>
            </div>
            <a href="../index.html" class="logo">GSC <span class="highlight">Salzgitter</span></a>
        </div>
    </header>

    <!-- Editorial Header Section -->
    <section class="section dark-bg" style="padding-top: calc(var(--nav-height) + 4rem); padding-bottom: 2rem;">
        <div class="container max-width-content">
            <span class="event-title-badge" style="margin-bottom: 1.25rem;">{{DATE}}</span>
            <h1 style="font-size: clamp(2.4rem, 6vw, 3.8rem); margin-bottom: 1.25rem; line-height: 1.1;">{{TITLE}}</h1>
            <p style="font-size: 1.15rem; color: var(--color-text-muted); line-height: 1.55;">{{DESCRIPTION}}</p>
        </div>
    </section>

    <!-- Editorial Content Section -->
    <section class="section black-bg" style="padding-top: 3rem; padding-bottom: 6rem;">
        <div class="container">
            <div class="blog-content max-width-content" style="color: var(--color-text-main); line-height: 1.75; font-size: 1.05rem;">
                
                {{CONTENT}}

                {{BACK_BUTTON}}
            </div>
        </div>
    </section>

    <!-- Master Footer -->
    {{FOOTER}}

    <script src="../js/script.js?v=1.2.0"></script>
</body>

</html>
