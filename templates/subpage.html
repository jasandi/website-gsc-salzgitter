<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{{TITLE}} - GSC Salzgitter e.V.</title>
    <link rel="stylesheet" href="../css/styles.css?v=1.1.3">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <meta name="description" content="{{DESCRIPTION}}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{TITLE}} - GSC Salzgitter e.V.">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:image" content="https://www.gsc-salzgitter.de/assets/favicon.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="{{TITLE}} - GSC Salzgitter e.V.">
    <meta property="twitter:description" content="{{DESCRIPTION}}">
    <meta property="twitter:image" content="https://www.gsc-salzgitter.de/assets/favicon.png">
</head>

<body>
    <!-- Navigation -->
    <header class="navbar scrolled">
        <div class="container" style="max-width: 800px; height: 100%; display: flex; align-items: center;">
            <div class="back-nav">
                <a href="../index.html">&larr; Startseite</a>
            </div>
        </div>
    </header>

    <!-- Blog Header Section -->
    <section class="section dark-bg" style="padding-top: 140px; padding-bottom: 2rem;">
        <div class="container" style="max-width: 800px; margin: 0 auto;">
            <span class="time"
                style="display: inline-block; background: var(--color-primary); color: #fff; padding: 0.3rem 0.8rem; border-radius: 20px; font-weight: 600; font-size: 0.9rem; margin-bottom: 1rem;">{{DATE}}</span>
            <h1 style="font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 1rem; line-height: 1.1;">{{TITLE}}</h1>
            <p style="font-size: 1.2rem; color: var(--color-text-muted);">{{DESCRIPTION}}</p>
        </div>
    </section>

    <!-- Blog Content Section -->
    <section class="section dark-bg" style="padding-top: 0;">
        <div class="container">
            <div class="blog-content"
                style="max-width: 800px; margin: 0 auto; color: var(--color-text); line-height: 1.8; font-size: 1.1rem;">

                {{CONTENT}}

                {{BACK_BUTTON}}
            </div>
        </div>
    </section>

    <!-- Footer -->
    {{FOOTER}}

    <script src="../js/script.js?v=1.0.5"></script>
</body>

</html>
